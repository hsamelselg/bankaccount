services:
  db:
    image: postgres:15
    container_name: banking_postgres
    environment:
      POSTGRES_DB: banking_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: banking_mq
    ports:
      - "5672:5672"
      - "15672:15672"

